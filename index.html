<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>きょうのえほん</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      background: #fafafa;
    }
    .container {
      max-width: 600px;
      margin: auto;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    p {
      margin-bottom: 16px;
    }
    .box {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .cta {
      display: block;
      text-align: center;
      background: #007aff;
      color: white;
      padding: 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">

    <h1>絵本、毎日読めていますか？</h1>

    <p>
      読もうとは思っているのに、続かない。<br>
      どの本を読めばいいか迷って、そのまま時間が過ぎてしまう。
    </p>

    <div class="box">
      <strong>こんなことありませんか？</strong>
      <ul>
        <li>絵本はあるのに読めていない</li>
        <li>何を読むか毎回迷う</li>
        <li>読んだかどうか分からない</li>
      </ul>
    </div>

    <div class="box">
      <strong>このアプリでできること</strong>
      <ul>
        <li>バーコードで本をかんたん登録</li>
        <li>「今日の1冊」がすぐ決まる</li>
        <li>読んだらタップで記録</li>
      </ul>
    </div>

    <p>
      続けるために必要な機能だけに絞りました。
    </p>

    <a href="#" class="cta">無料で試す（準備中）</a>

    <p style="margin-top:20px; font-size:12px; color:#666;">
      ※現在開発中です。興味があればブックマークしておいてください。
    </p>

  </div>
</body>
</html>
